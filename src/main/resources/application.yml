server:
  port: 8080

llm:
  base-url: https://api.hunyuan.cloud.tencent.com/v1
  api-key: ${HUNYUAN_API_KEY:}
  model: hunyuan-turbos-latest
  timeout-ms: 15000
  stream-timeout-ms: 120000

agent:
  max-steps: 8

rag:
  enabled: true
  top-k: 3
  max-chunk-chars: 600
  corpus-pattern: classpath:rag/*.md

management:
  endpoints:
    web:
      exposure:
        include: health,info
