server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_ADDRESS:127.0.0.1:3306}/agent_gateway_demo?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
logging:
  level:
    # 将你的 mapper 包路径改为 DEBUG（根据你的实际包路径修改）
    org.tenny: debug

app:
  security:
    # Opaque UUID token TTL in Redis (hours)
    session-expire-hours: 168
  conversation:
    # Cached LLM message lists in Redis (hours). 0 = no TTL on conversation keys.
    redis-ttl-hours: 168
  bootstrap-admin:
    # If both set, creates or resets this admin on startup (BCrypt hash stored).
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
  # 通用会话「联网」使用 Tavily：https://tavily.com — 用户勾选联网时才会请求
  web-search:
    base-url: https://api.tavily.com/search
    api-key: ${TAVILY_API_KEY:}
    max-results: 5
    max-snippet-chars-per-result: 800
    timeout-ms: 15000

llm:
  name: default
  base-url: https://ark.cn-beijing.volces.com/api/v3
  api-key: ${LLM_API_KEY:}
  model: deepseek-v3-2-251201
  timeout-ms: 15000
  stream-timeout-ms: 120000

agent:
  max-steps: 8

rag:
  enabled: true
  top-k: 3
  max-chunk-chars: 600
  corpus-pattern: classpath:rag/*.md

management:
  endpoints:
    web:
      exposure:
        include: health,info
