<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理员技能管理 · agent-gateway-demo</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel-2: #f8f9fa;
      --border: #e1e5e9;
      --text: #24292f;
      --muted: #656d76;
      --accent: #0969da;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.6rem;
      text-align: left;
      vertical-align: middle;
    }

    thead th {
      background: var(--panel-2);
      font-weight: 600;
    }

    .status {
      margin-top: 0.75rem;
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .status.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status.err {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status.info {
      display: block;
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 1.2rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
      margin-top: 0.8rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1 class="title">技能管理（管理员视角）</h1>
    <button id="btnRefreshSkills" class="btn primary" type="button">刷新列表</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>技能名称</th>
        <th>描述</th>
        <th>所属用户</th>
        <th>状态</th>
      </tr>
    </thead>
    <tbody id="skillsTableBody"></tbody>
  </table>

  <div id="emptyState" class="empty">暂无技能数据</div>
  <div id="status" class="status"></div>

  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";
      var skillsTableBody = document.getElementById("skillsTableBody");
      var emptyState = document.getElementById("emptyState");
      var statusEl = document.getElementById("status");
      var btnRefreshSkills = document.getElementById("btnRefreshSkills");

      function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
      function authHeaders() {
        var h = {};
        var t = getToken();
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }
      function setStatus(text, cls) {
        statusEl.textContent = text || "";
        statusEl.className = "status" + (cls ? " " + cls : "");
      }
      function safe(v) { return v == null ? "" : String(v); }

      function renderSkills(data) {
        skillsTableBody.innerHTML = "";
        if (!data || !data.length) {
          emptyState.style.display = "block";
          return;
        }
        emptyState.style.display = "none";
        data.forEach(function (skill) {
          var row = document.createElement("tr");
          row.innerHTML =
            "<td>" + safe(skill.id) + "</td>" +
            "<td>" + safe(skill.title) + "</td>" +
            "<td>" + safe(skill.description) + "</td>" +
            "<td>" + safe(skill.username || skill.userName || skill.owner || "未知") + "</td>" +
            "<td>" + (skill.isActive ? "启用" : "禁用") + "</td>";
          skillsTableBody.appendChild(row);
        });
      }

      function loadAllSkills() {
        setStatus("加载中...", "info");
        fetch("/api/admin/skills", { headers: authHeaders() })
          .then(function (res) {
            if (res.status === 401) {
              window.top.location.href = "/login.html?redirect=" + encodeURIComponent("/admin.html");
              return null;
            }
            if (res.status === 403) {
              setStatus("无管理员权限", "err");
              return null;
            }
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (data) {
            if (!data) return;
            renderSkills(data);
            setStatus("", "");
          })
          .catch(function (e) {
            setStatus("加载失败: " + e.message, "err");
          });
      }

      btnRefreshSkills.addEventListener("click", loadAllSkills);
      loadAllSkills();
    })();
  </script>
</body>
</html>
