<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 · agent-gateway-demo</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #58a6ff;
      --ok: #3fb950;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 26rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    h1 { font-size: 1.05rem; margin: 0 0 0.8rem; }
    .hint { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
    .row { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.75rem; }
    label { font-size: 0.85rem; color: var(--muted); }
    input, button {
      background: #111827;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.5rem 0.65rem;
      font-size: 0.9rem;
      width: 100%;
    }
    button {
      cursor: pointer;
      background: #1f6feb;
      border-color: #388bfd;
      color: #fff;
      margin-top: 0.2rem;
    }
    .status { min-height: 1.25rem; font-size: 0.85rem; color: var(--muted); margin-top: 0.35rem; }
    .status.ok { color: var(--ok); }
    .status.err { color: #f85149; }
    .footer { margin-top: 0.85rem; font-size: 0.85rem; color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <section class="card">
    <h1>登录</h1>
    <p class="hint">登录后可访问聊天与管理能力。</p>
    <div class="row">
      <label for="username">用户名</label>
      <input id="username" type="text" autocomplete="username" placeholder="请输入用户名" />
    </div>
    <div class="row">
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
    </div>
    <button type="button" id="btnLogin">登录</button>
    <div class="status" id="status"></div>
    <p class="footer">
      还没有账号？<a href="/register.html">去注册</a> · <a href="/">返回聊天页</a>
    </p>
  </section>

  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";
      var userEl = document.getElementById("username");
      var passEl = document.getElementById("password");
      var btnLogin = document.getElementById("btnLogin");
      var status = document.getElementById("status");

      function setStatus(text, cls) {
        status.textContent = text || "";
        status.className = "status" + (cls ? " " + cls : "");
      }

      function getRedirect() {
        var raw = new URLSearchParams(window.location.search).get("redirect") || "/";
        if (!raw.startsWith("/")) {
          return "/";
        }
        return raw;
      }

      function gotoAfterLogin() {
        window.location.href = getRedirect();
      }

      btnLogin.addEventListener("click", function () {
        var u = (userEl.value || "").trim();
        var p = passEl.value || "";
        if (!u || !p) {
          setStatus("请填写用户名和密码", "err");
          return;
        }
        btnLogin.disabled = true;
        setStatus("登录中…", "");
        fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (b) {
                throw new Error((b && b.error) ? b.error : "HTTP " + res.status);
              });
            }
            return res.json();
          })
          .then(function (data) {
            if (data && data.token) {
              localStorage.setItem(TOKEN_KEY, data.token);
            }
            setStatus("登录成功，正在跳转…", "ok");
            setTimeout(gotoAfterLogin, 220);
          })
          .catch(function (e) {
            setStatus(String(e.message || e), "err");
          })
          .finally(function () {
            btnLogin.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
