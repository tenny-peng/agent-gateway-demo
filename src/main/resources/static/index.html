<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agent-gateway-demo</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #58a6ff;
      --ok: #3fb950;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 1.25rem;
      max-width: 52rem;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.75rem; }
    .hidden { display: none !important; }
    .auth-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
    }
    .auth-panel a { color: var(--accent); text-decoration: none; }
    .auth-panel a:hover { text-decoration: underline; }
    #authInfo { color: var(--muted); margin-right: 0.35rem; }
    .hint { color: var(--muted); font-size: 0.8rem; margin-bottom: 1rem; line-height: 1.5; }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .tab {
      cursor: pointer;
      padding: 0.45rem 0.85rem;
      border-radius: 6px 6px 0 0;
      border: 1px solid transparent;
      font-size: 0.88rem;
      color: var(--muted);
      background: transparent;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab.active {
      color: var(--text);
      border-color: var(--border);
      border-bottom-color: var(--panel);
      margin-bottom: -1px;
      background: var(--panel);
    }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
    label { font-size: 0.85rem; color: var(--muted); }
    select, textarea, button, input[type="text"], input[type="password"] {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.45rem 0.6rem;
      font-size: 0.9rem;
    }
    input.auth-input { min-width: 7rem; max-width: 12rem; }
    textarea {
      width: 100%;
      min-height: 5rem;
      resize: vertical;
      font-family: inherit;
    }
    button {
      cursor: pointer;
      background: #212c3d;
    }
    button.primary {
      background: #1f6feb;
      border-color: #388bfd;
      color: #fff;
    }
    button.primary:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #convId {
      flex: 1;
      min-width: 12rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    #out {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      min-height: 8rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
      line-height: 1.55;
    }
    #out.md-body {
      white-space: normal;
    }
    #out.md-body p { margin: 0.5em 0; }
    #out.md-body p:first-child { margin-top: 0; }
    #out.md-body strong { font-weight: 600; }
    #out.md-body ul, #out.md-body ol { margin: 0.5em 0; padding-left: 1.35rem; }
    #out.md-body li { margin: 0.2em 0; }
    #out.md-body code {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.88em;
      background: rgba(0, 0, 0, 0.28);
      padding: 0.12em 0.4em;
      border-radius: 4px;
    }
    #out.md-body pre {
      background: #0d1117;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.6em 0;
    }
    #out.md-body pre code { background: none; padding: 0; }
    #out.md-body h1, #out.md-body h2, #out.md-body h3 {
      font-size: 1.02em;
      font-weight: 600;
      margin: 0.85em 0 0.4em;
    }
    #out.md-body hr { border: none; border-top: 1px solid var(--border); margin: 0.85rem 0; }
    #out.md-body blockquote {
      margin: 0.5em 0;
      padding-left: 0.85rem;
      border-left: 3px solid var(--border);
      color: var(--muted);
    }
    #out:empty::before {
      content: "回复会出现在这里…";
      color: var(--muted);
    }
    .status { font-size: 0.8rem; color: var(--muted); min-height: 1.25rem; }
    .status.ok { color: var(--ok); }
    .status.err { color: #f85149; }
    code { font-size: 0.82em; }
  </style>
</head>
<body>
  <h1>agent-gateway-demo · 流式测试</h1>

  <div class="auth-panel" id="authPanel">
    <div class="auth-logged-out" id="authLoggedOut">
      <input type="text" id="authUser" class="auth-input" placeholder="用户名" autocomplete="username" />
      <input type="password" id="authPass" class="auth-input" placeholder="密码（注册≥6位）" autocomplete="current-password" />
      <button type="button" class="primary" id="btnLogin">登录</button>
      <button type="button" id="btnRegister">注册</button>
    </div>
    <div class="auth-logged-in hidden" id="authLoggedIn">
      <span id="authInfo"></span>
      <a href="/admin.html" id="linkAdmin" class="hidden">管理后台</a>
      <button type="button" id="btnLogout">退出</button>
    </div>
  </div>

  <p class="hint">
    需先<strong>登录</strong>后方可提问（服务端 UUID 会话存在 Redis，请求头：<code>Authorization: Bearer …</code>）。<strong>通用</strong>：
    <code>POST /api/generic/chat/stream</code>。<strong>物流客服</strong>：
    <code>POST /api/logistics/agent/chat/stream</code>。首包 JSON 含
    <code>conversationId</code>。需配置 <code>HUNYUAN_API_KEY</code>（默认 8080）。
    回复在<strong>整段流结束后</strong>会以 Markdown 渲染。
  </p>

  <div class="tabs" role="tablist">
    <button type="button" class="tab active" data-mode="generic" role="tab" aria-selected="true">通用问答</button>
    <button type="button" class="tab" data-mode="logistics" role="tab" aria-selected="false">物流客服（业务 Agent）</button>
  </div>

  <div class="row">
    <textarea id="msg" placeholder="输入消息…"></textarea>
  </div>

  <div class="row">
    <button type="button" class="primary" id="send">发送（流式）</button>
    <button type="button" id="newConv">新会话</button>
    <span style="flex:1"></span>
    <label for="convId">conversationId</label>
    <input type="text" id="convId" readonly placeholder="（首轮后自动填入）" />
  </div>

  <div class="status" id="status"></div>
  <div id="out" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";

      var msg = document.getElementById("msg");
      var send = document.getElementById("send");
      var newConv = document.getElementById("newConv");
      var convId = document.getElementById("convId");
      var out = document.getElementById("out");
      var status = document.getElementById("status");
      var tabs = document.querySelectorAll(".tab");

      var authUser = document.getElementById("authUser");
      var authPass = document.getElementById("authPass");
      var btnLogin = document.getElementById("btnLogin");
      var btnRegister = document.getElementById("btnRegister");
      var btnLogout = document.getElementById("btnLogout");
      var authLoggedOut = document.getElementById("authLoggedOut");
      var authLoggedIn = document.getElementById("authLoggedIn");
      var authInfo = document.getElementById("authInfo");
      var linkAdmin = document.getElementById("linkAdmin");

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      function authHeadersJson() {
        var h = { "Content-Type": "application/json" };
        var t = getToken();
        if (t) {
          h["Authorization"] = "Bearer " + t;
        }
        return h;
      }

      function showLoggedOut() {
        authLoggedOut.classList.remove("hidden");
        authLoggedIn.classList.add("hidden");
        linkAdmin.classList.add("hidden");
      }

      function showLoggedIn(username, role) {
        authLoggedOut.classList.add("hidden");
        authLoggedIn.classList.remove("hidden");
        authInfo.textContent = username + " · " + role;
        linkAdmin.classList.toggle("hidden", role !== "ADMIN");
      }

      function refreshSession() {
        var t = getToken();
        if (!t) {
          showLoggedOut();
          return Promise.resolve();
        }
        return fetch("/api/auth/me", { headers: authHeadersJson() }).then(function (res) {
          if (!res.ok) {
            localStorage.removeItem(TOKEN_KEY);
            showLoggedOut();
            return;
          }
          return res.json().then(function (me) {
            showLoggedIn(me.username, me.role);
          });
        }).catch(function () {
          localStorage.removeItem(TOKEN_KEY);
          showLoggedOut();
        });
      }

      btnLogin.addEventListener("click", function () {
        var u = (authUser.value || "").trim();
        var p = authPass.value || "";
        if (!u || !p) {
          setStatus("请填写用户名和密码", "err");
          return;
        }
        setStatus("登录中…", "");
        fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (b) {
                throw new Error((b && b.error) ? b.error : "HTTP " + res.status);
              });
            }
            return res.json();
          })
          .then(function (data) {
            if (data && data.token) {
              localStorage.setItem(TOKEN_KEY, data.token);
            }
            return refreshSession();
          })
          .then(function () {
            setStatus("已登录", "ok");
          })
          .catch(function (e) {
            setStatus(String(e.message || e), "err");
          });
      });

      btnRegister.addEventListener("click", function () {
        var u = (authUser.value || "").trim();
        var p = authPass.value || "";
        if (!u || !p) {
          setStatus("请填写用户名和密码", "err");
          return;
        }
        if (p.length < 6) {
          setStatus("密码至少 6 位", "err");
          return;
        }
        setStatus("注册中…", "");
        fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (b) {
                throw new Error((b && b.error) ? b.error : "HTTP " + res.status);
              });
            }
            return res.json();
          })
          .then(function (data) {
            if (data && data.token) {
              localStorage.setItem(TOKEN_KEY, data.token);
            }
            return refreshSession();
          })
          .then(function () {
            setStatus("注册成功，已自动登录", "ok");
          })
          .catch(function (e) {
            setStatus(String(e.message || e), "err");
          });
      });

      btnLogout.addEventListener("click", function () {
        var t = getToken();
        function finish() {
          localStorage.removeItem(TOKEN_KEY);
          showLoggedOut();
          setStatus("已退出", "ok");
        }
        if (!t) {
          finish();
          return;
        }
        fetch("/api/auth/logout", { method: "POST", headers: authHeadersJson() })
          .then(finish, finish);
      });

      var mode = "generic";
      var convByMode = { generic: "", logistics: "" };

      var streamUrl = {
        generic: "/api/generic/chat/stream",
        logistics: "/api/logistics/agent/chat/stream"
      };

      var placeholders = {
        generic: "例如：用三句话解释什么是 RAG",
        logistics: "例如：查一下运单 SF001 的状态 / 延误怎么跟客户说"
      };

      function setStatus(text, cls) {
        status.textContent = text || "";
        status.className = "status" + (cls ? " " + cls : "");
      }

      function renderMarkdownFinal(md) {
        out.className = "md-body";
        if (typeof marked === "undefined" || typeof DOMPurify === "undefined") {
          out.textContent = md || "";
          return;
        }
        var html = marked.parse(md || "", { mangle: false, headerIds: false });
        out.innerHTML = DOMPurify.sanitize(html);
      }

      function clearOutput() {
        out.className = "";
        out.textContent = "";
      }

      function applyMode(m) {
        convByMode[mode] = convId.value.trim();
        mode = m;
        convId.value = convByMode[m] || "";
        msg.placeholder = placeholders[m];
        tabs.forEach(function (t) {
          var on = t.getAttribute("data-mode") === m;
          t.classList.toggle("active", on);
          t.setAttribute("aria-selected", on ? "true" : "false");
        });
        clearOutput();
        setStatus("", "");
      }

      tabs.forEach(function (t) {
        t.addEventListener("click", function () {
          applyMode(t.getAttribute("data-mode"));
        });
      });

      newConv.addEventListener("click", function () {
        convId.value = "";
        convByMode[mode] = "";
        clearOutput();
        setStatus("已清空当前入口的会话", "ok");
      });

      function parseSseEvents(buffer, onEventData) {
        var dataLines = [];
        var lineEnd;
        while ((lineEnd = buffer.indexOf("\n")) !== -1) {
          var raw = buffer.slice(0, lineEnd);
          buffer = buffer.slice(lineEnd + 1);
          var line = raw.replace(/\r$/, "");
          if (line === "") {
            if (dataLines.length) {
              onEventData(dataLines.join("\n"));
              dataLines = [];
            }
            continue;
          }
          if (line.indexOf("data:") === 0) {
            var payload = line.slice(5);
            if (payload.indexOf(" ") === 0) {
              payload = payload.slice(1);
            }
            dataLines.push(payload);
          }
        }
        return buffer;
      }

      send.addEventListener("click", async function () {
        if (!getToken()) {
          setStatus("请先登录或注册", "err");
          return;
        }
        var text = (msg.value || "").trim();
        if (!text) {
          setStatus("请先输入消息", "err");
          return;
        }
        send.disabled = true;
        clearOutput();
        setStatus("请求中…");

        var url = streamUrl[mode];
        var body = {
          message: text,
          conversationId: convId.value.trim() || undefined
        };

        try {
          var res = await fetch(url, {
            method: "POST",
            headers: authHeadersJson(),
            body: JSON.stringify(body)
          });
          if (res.status === 401) {
            localStorage.removeItem(TOKEN_KEY);
            showLoggedOut();
            throw new Error("登录已失效，请重新登录");
          }
          if (!res.ok) {
            var errText = await res.text();
            throw new Error("HTTP " + res.status + ": " + errText);
          }
          if (!res.body || !res.body.getReader) {
            throw new Error("浏览器不支持流式读取");
          }

          var reader = res.body.getReader();
          var dec = new TextDecoder();
          var buf = "";
          var outText = "";

          while (true) {
            var part = await reader.read();
            if (part.done) break;
            buf += dec.decode(part.value, { stream: true });
            buf = parseSseEvents(buf, function (payload) {
              var j = null;
              try {
                j = JSON.parse(payload);
              } catch (e) {
                outText += payload;
                out.textContent = outText;
                return;
              }
              if (j && typeof j.conversationId === "string" && j.conversationId) {
                convId.value = j.conversationId;
                convByMode[mode] = j.conversationId;
                return;
              }
              outText += payload;
              out.textContent = outText;
            });
          }
          if (buf.length) {
            buf = parseSseEvents(buf + "\n\n", function (payload) {
              try {
                var j = JSON.parse(payload);
                if (j && typeof j.conversationId === "string" && j.conversationId) {
                  convId.value = j.conversationId;
                  convByMode[mode] = j.conversationId;
                  return;
                }
              } catch (e) {}
              outText += payload;
              out.textContent = outText;
            });
          }

          renderMarkdownFinal(outText);
          setStatus("完成", "ok");
        } catch (e) {
          clearOutput();
          out.textContent = String(e.message || e);
          setStatus(String(e.message || e), "err");
        } finally {
          send.disabled = false;
        }
      });

      applyMode("generic");
      refreshSession();
    })();
  </script>
</body>
</html>
