<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册 · agent-gateway-demo</title>
  <style>
    :root {
      --bg: #fafbfc;
      --panel: #ffffff;
      --border: #e1e5e9;
      --text: #24292f;
      --muted: #656d76;
      --accent: #0969da;
      --ok: #238636;
      --err: #da3633;
      --shadow: 0 1px 3px rgba(27, 31, 35, 0.12), 0 1px 2px rgba(27, 31, 35, 0.24);
      --shadow-lg: 0 8px 24px rgba(27, 31, 35, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(9, 105, 218, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(35, 134, 54, 0.03) 0%, transparent 50%);
    }

    .card {
      width: 100%;
      max-width: 28rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      animation: cardSlideIn 0.3s ease-out;
    }

    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .logo-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0 0 0.5rem;
      font-weight: 600;
      text-align: center;
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 1.5;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 500;
    }

    input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      width: 100%;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
    }

    input::placeholder {
      color: var(--muted);
    }

    button {
      cursor: pointer;
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #ffffff;
      border-radius: 8px;
      padding: 0.875rem 1rem;
      font-size: 0.95rem;
      font-weight: 500;
      width: 100%;
      margin-top: 0.5rem;
      transition: all 0.15s ease;
    }

    button:hover {
      background: #0858cc;
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      min-height: 1.5rem;
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 1rem;
      text-align: center;
      font-weight: 500;
    }

    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }

    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .logo-title {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="logo">
      <span class="logo-icon">🤖</span>
      <h2 class="logo-title">Agent Gateway</h2>
    </div>

    <h1>创建账号</h1>
    <p class="hint">加入我们，开始与 AI 助手对话。注册成功后将自动登录。</p>

    <div class="row">
      <label for="username">用户名</label>
      <input id="username" type="text" autocomplete="username" placeholder="请输入用户名" />
    </div>

    <div class="row">
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="请输入密码（至少 6 位）" />
    </div>

    <button type="button" id="btnRegister">创建账号</button>
    <div class="status" id="status"></div>

    <p class="footer">
      已有账号？<a href="/login.html">立即登录</a>
    </p>
  </section>

  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";
      var userEl = document.getElementById("username");
      var passEl = document.getElementById("password");
      var btnRegister = document.getElementById("btnRegister");
      var status = document.getElementById("status");

      function setStatus(text, cls) {
        status.textContent = text || "";
        status.className = "status" + (cls ? " " + cls : "");
      }

      function getRedirect() {
        var raw = new URLSearchParams(window.location.search).get("redirect") || "/";
        if (!raw.startsWith("/")) {
          return "/";
        }
        return raw;
      }

      function gotoAfterRegister() {
        window.location.href = getRedirect();
      }

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      function initSessionGuard() {
        var t = getToken();
        if (!t) {
          return;
        }
        fetch("/api/auth/me", { headers: { "Authorization": "Bearer " + t } })
          .then(function (res) {
            if (!res.ok) {
              localStorage.removeItem(TOKEN_KEY);
              return;
            }
            gotoAfterRegister();
          })
          .catch(function () {
            localStorage.removeItem(TOKEN_KEY);
          });
      }

      btnRegister.addEventListener("click", function () {
        var u = (userEl.value || "").trim();
        var p = passEl.value || "";
        if (!u || !p) {
          setStatus("请填写用户名和密码", "err");
          return;
        }
        if (p.length < 6) {
          setStatus("密码至少 6 位", "err");
          return;
        }
        btnRegister.disabled = true;
        setStatus("注册中...", "");
        fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (b) {
                throw new Error((b && b.error) ? b.error : "HTTP " + res.status);
              });
            }
            return res.json();
          })
          .then(function (data) {
            if (data && data.token) {
              localStorage.setItem(TOKEN_KEY, data.token);
            }
            setStatus("注册成功，正在跳转...", "ok");
            setTimeout(gotoAfterRegister, 220);
          })
          .catch(function (e) {
            setStatus(String(e.message || e), "err");
          })
          .finally(function () {
            btnRegister.disabled = false;
          });
      });

      initSessionGuard();
    })();
  </script>
</body>
</html>
