<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>技能管理 · agent-gateway-demo</title>
  <style>
    :root {
      --bg: #fafbfc;
      --panel: #ffffff;
      --panel-2: #f8f9fa;
      --border: #e1e5e9;
      --text: #24292f;
      --muted: #656d76;
      --accent: #0969da;
      --ok: #238636;
      --err: #da3633;
      --warn: #bf8700;
      --shadow: 0 1px 3px rgba(27, 31, 35, 0.12), 0 1px 2px rgba(27, 31, 35, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }

    .title {
      font-size: 2rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin: 0;
    }

    .nav {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .nav-link {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .nav-link:hover {
      background: #0858cc;
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .skill-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      background: var(--panel);
      transition: all 0.15s ease;
      box-shadow: 0 1px 2px rgba(27, 31, 35, 0.06);
    }

    .skill-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .skill-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .skill-icon {
      font-size: 1.5rem;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #ffffff;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .skill-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      color: var(--text);
    }

    .skill-description {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 0 0 1rem;
    }

    .skill-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .skill-status {
      padding: 0.25rem 0.5rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .skill-status.active {
      background: #dcfce7;
      color: #166534;
    }

    .skill-status.inactive {
      background: #fef3c7;
      color: #92400e;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }

    .empty-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: var(--text);
    }

    .empty-description {
      font-size: 0.9rem;
      margin: 0;
    }

    .actions {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button, .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #ffffff;
      border: 1px solid var(--accent);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover, .btn:hover {
      background: #0858cc;
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 6px;
      font-weight: 500;
      text-align: center;
    }

    .status.ok {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status.err {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status.info {
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .skills-grid {
        grid-template-columns: 1fr;
      }

      .nav-links {
        flex-direction: column;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">技能管理</h1>
      <p class="subtitle">管理系统中的 AI 技能和功能模块</p>
    </div>

    <nav class="nav">
      <div class="nav-links">
        <a href="/" class="nav-link">返回首页</a>
        <a href="/admin.html" class="nav-link">管理后台</a>
        <a href="/llm-configs.html" class="nav-link">LLM 配置管理</a>
      </div>
    </nav>

    <main class="content">
      <div id="skillsContainer" class="skills-grid">
        <!-- Skills will be loaded here -->
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <span class="empty-icon">🔧</span>
        <h3 class="empty-title">暂无可用的技能</h3>
        <p class="empty-description">系统正在初始化技能模块，请稍后再试。</p>
      </div>

      <div class="actions">
        <button id="btnRefreshSkills">刷新技能列表</button>
      </div>

      <div class="status" id="status" style="display: none;"></div>
    </main>
  </div>

  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";
      var skillsContainer = document.getElementById("skillsContainer");
      var emptyState = document.getElementById("emptyState");
      var statusEl = document.getElementById("status");
      var btnRefreshSkills = document.getElementById("btnRefreshSkills");

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      function authHeaders() {
        var h = {};
        var t = getToken();
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function setStatus(text, cls) {
        statusEl.textContent = text || "";
        statusEl.className = "status " + (cls || "info");
        statusEl.style.display = text ? "block" : "none";
      }

      function createSkillCard(skill) {
        var card = document.createElement("div");
        card.className = "skill-card";

        var header = document.createElement("div");
        header.className = "skill-header";

        var icon = document.createElement("div");
        icon.className = "skill-icon";
        icon.textContent = skill.icon || "🤖";

        var title = document.createElement("h3");
        title.className = "skill-title";
        title.textContent = skill.title || "未命名技能";

        header.appendChild(icon);
        header.appendChild(title);

        var description = document.createElement("p");
        description.className = "skill-description";
        description.textContent = skill.description || "暂无描述";

        var meta = document.createElement("div");
        meta.className = "skill-meta";

        var status = document.createElement("span");
        status.className = "skill-status " + (skill.isActive ? "active" : "inactive");
        status.textContent = skill.isActive ? "启用" : "禁用";

        meta.appendChild(status);

        card.appendChild(header);
        card.appendChild(description);
        card.appendChild(meta);

        return card;
      }

      function loadSkills() {
        setStatus("加载中...", "info");

        fetch("/api/skills", { headers: authHeaders() })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (data) {
            skillsContainer.innerHTML = "";
            setStatus("");

            if (!data || !data.length) {
              emptyState.style.display = "block";
              skillsContainer.style.display = "none";
              return;
            }

            emptyState.style.display = "none";
            skillsContainer.style.display = "grid";

            data.forEach(function (skill) {
              var card = createSkillCard(skill);
              skillsContainer.appendChild(card);
            });
          })
          .catch(function (e) {
            console.error("Failed to load skills:", e);
            setStatus("加载失败: " + e.message, "err");
            emptyState.style.display = "block";
            skillsContainer.style.display = "none";
          });
      }

      btnRefreshSkills.addEventListener("click", function () {
        btnRefreshSkills.disabled = true;
        btnRefreshSkills.textContent = "刷新中...";
        loadSkills();
        setTimeout(function () {
          btnRefreshSkills.disabled = false;
          btnRefreshSkills.textContent = "刷新技能列表";
        }, 1000);
      });

      // 页面加载时获取技能数据
      loadSkills();

      // 检查权限
      fetch("/api/auth/me", { headers: authHeaders() })
        .then(function (res) {
          if (!res.ok || res.status === 401) {
            window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.pathname);
            return;
          }
          return res.json();
        })
        .then(function (me) {
          if (!me) {
            window.location.href = "/login.html";
            return;
          }
        })
        .catch(function () {
          window.location.href = "/login.html";
        });
    })();
  </script>
</body>
</html>
