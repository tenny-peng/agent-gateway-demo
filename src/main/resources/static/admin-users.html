<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>用户管理 · agent-gateway-demo</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel-2: #f8f9fa;
      --border: #e1e5e9;
      --text: #24292f;
      --muted: #656d76;
      --accent: #0969da;
      --ok: #238636;
      --err: #da3633;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.9rem;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      cursor: pointer;
    }

    .btn:hover { filter: brightness(0.95); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.6rem;
      text-align: left;
      vertical-align: middle;
    }

    thead th {
      background: var(--panel-2);
      font-weight: 600;
    }

    .inline-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .btn-sm {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.55rem;
      background: #fff;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .status {
      margin-top: 0.75rem;
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .status.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status.err {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status.info {
      display: block;
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 1.2rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
      margin-top: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1 class="title">用户管理</h1>
    <button id="btnLoadUsers" class="btn" type="button">刷新用户列表</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>角色</th>
        <th>注册时间</th>
        <th>会话数</th>
        <th>聊天限制状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="usersTableBody"></tbody>
  </table>

  <div id="empty" class="empty" style="display: none;">暂无用户</div>
  <div id="status" class="status"></div>

  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";
      var btnLoadUsers = document.getElementById("btnLoadUsers");
      var usersTableBody = document.getElementById("usersTableBody");
      var statusEl = document.getElementById("status");
      var emptyEl = document.getElementById("empty");

      function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
      function authHeaders() {
        var h = {};
        var t = getToken();
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function setStatus(text, cls) {
        statusEl.textContent = text || "";
        statusEl.className = "status" + (cls ? " " + cls : "");
      }

      function safeText(v) {
        return v == null ? "" : String(v);
      }

      function loadChatLimitStatus(userId) {
        return fetch("/api/admin/users/" + userId + "/chat-limit", { headers: authHeaders() })
          .then(function (res) {
            if (res.status === 404) return { limitEnabled: false };
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (data) {
            var cell = document.getElementById("limit-" + userId);
            if (cell) {
              cell.textContent = data.limitEnabled ? "已启用" : "无限制";
            }
          })
          .catch(function () {
            var cell = document.getElementById("limit-" + userId);
            if (cell) {
              cell.textContent = "未知";
            }
          });
      }

      function toggleChatLimit(userId, limitEnabled) {
        setStatus("更新中...", "info");
        fetch("/api/admin/users/" + userId + "/chat-limit?limitEnabled=" + limitEnabled, {
          method: "PUT",
          headers: authHeaders()
        })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            setStatus("更新成功", "ok");
            loadChatLimitStatus(userId);
          })
          .catch(function (e) {
            setStatus("更新失败: " + e.message, "err");
          });
      }

      function renderUsers(users) {
        usersTableBody.innerHTML = "";
        if (!users || !users.length) {
          emptyEl.style.display = "block";
          return;
        }
        emptyEl.style.display = "none";

        users.forEach(function (user) {
          var row = document.createElement("tr");
          row.innerHTML =
            "<td>" + safeText(user.id) + "</td>" +
            "<td>" + safeText(user.username) + "</td>" +
            "<td>" + safeText(user.role) + "</td>" +
            "<td>" + safeText(user.createdAt) + "</td>" +
            "<td>" + safeText(user.sessionCount || 0) + "</td>" +
            "<td id='limit-" + safeText(user.id) + "'>加载中...</td>" +
            "<td><div class='inline-actions'>" +
              "<button class='btn-sm' data-action='disable' data-user-id='" + safeText(user.id) + "'>禁用限制</button>" +
              "<button class='btn-sm' data-action='enable' data-user-id='" + safeText(user.id) + "'>启用限制</button>" +
            "</div></td>";
          usersTableBody.appendChild(row);
          loadChatLimitStatus(user.id);
        });
      }

      function loadUsers() {
        btnLoadUsers.disabled = true;
        setStatus("加载用户列表中...", "info");
        fetch("/api/admin/users", { headers: authHeaders() })
          .then(function (res) {
            if (res.status === 401) {
              window.top.location.href = "/login.html?redirect=" + encodeURIComponent("/admin.html");
              return null;
            }
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (users) {
            if (!users) return;
            renderUsers(users);
            setStatus("用户列表加载完成", "ok");
          })
          .catch(function (e) {
            setStatus("加载失败: " + e.message, "err");
          })
          .finally(function () {
            btnLoadUsers.disabled = false;
          });
      }

      usersTableBody.addEventListener("click", function (e) {
        var target = e.target;
        if (!target || !target.getAttribute) return;
        var action = target.getAttribute("data-action");
        var userId = target.getAttribute("data-user-id");
        if (!action || !userId) return;
        toggleChatLimit(userId, action === "enable");
      });

      btnLoadUsers.addEventListener("click", loadUsers);

      loadUsers();
    })();
  </script>
</body>
</html>
