<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台 · agent-gateway-demo</title>
  <style>
    :root {
      --bg: #fafbfc;
      --panel: #ffffff;
      --panel-2: #f8f9fa;
      --border: #e1e5e9;
      --text: #24292f;
      --muted: #656d76;
      --accent: #0969da;
      --shadow: 0 1px 3px rgba(27, 31, 35, 0.12), 0 1px 2px rgba(27, 31, 35, 0.24);
      --shadow-lg: 0 8px 24px rgba(27, 31, 35, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      padding: 1rem;
    }

    .hidden { display: none !important; }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      height: calc(100vh - 2rem);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 1rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .app-name {
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .user-dropdown {
      position: relative;
      display: inline-block;
    }

    .user-dropdown-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      transition: all 0.15s ease;
      font-size: 0.9rem;
    }

    .user-dropdown-toggle:hover {
      background: var(--panel-2);
      box-shadow: var(--shadow);
    }

    .user-dropdown-toggle .arrow {
      font-size: 0.75rem;
      color: var(--muted);
      transition: transform 0.2s ease;
    }

    .user-dropdown.open .arrow { transform: rotate(180deg); }

    .user-dropdown-menu {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      min-width: 160px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.15s ease;
      z-index: 100;
    }

    .user-dropdown.open .user-dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .user-dropdown-item {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .user-dropdown-item:hover { background: var(--panel-2); }

    .layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 1rem;
      min-height: 0;
    }

    .menu-panel, .content-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .menu-panel {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-title {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 0.65rem 0.75rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .menu-item:hover {
      border-color: var(--accent);
      background: #f0f6ff;
    }

    .menu-item.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .content-panel {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .content-head {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
      font-weight: 600;
    }

    #contentFrame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 900px) {
      body { padding: 0.75rem; }
      .page { height: calc(100vh - 1.5rem); }
      .layout { grid-template-columns: 1fr; }
      .menu-panel { flex-direction: row; flex-wrap: wrap; }
      .menu-title { width: 100%; }
      .menu-item { width: auto; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="app-name">AI Agent Demo Admin</div>
      <div class="user-dropdown" id="userDropdown">
        <button class="user-dropdown-toggle" type="button">
          <span id="authInfo"></span>
          <span class="arrow">▼</span>
        </button>
        <div class="user-dropdown-menu">
          <button class="user-dropdown-item" type="button" id="btnLogout">退出</button>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="menu-panel">
        <p class="menu-title">后台菜单</p>
        <button class="menu-item active" data-page="/users-admin.html" data-title="用户管理">用户管理</button>
        <button class="menu-item" data-page="/llm-configs.html" data-title="LLM 配置管理">LLM 配置管理</button>
        <button class="menu-item" data-page="/admin-skills.html" data-title="技能管理">技能管理</button>
      </aside>
      <main class="content-panel">
        <div class="content-head" id="contentTitle">用户管理</div>
        <iframe id="contentFrame" src="/users-admin.html" title="Admin Content"></iframe>
      </main>
    </div>
  </div>

  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";
      var authInfo = document.getElementById("authInfo");
      var btnLogout = document.getElementById("btnLogout");
      var userDropdown = document.getElementById("userDropdown");
      var menuItems = document.querySelectorAll(".menu-item");
      var contentFrame = document.getElementById("contentFrame");
      var contentTitle = document.getElementById("contentTitle");

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      function authHeadersJson() {
        var h = { "Content-Type": "application/json" };
        var t = getToken();
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function authHeaders() {
        var h = {};
        var t = getToken();
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function gotoLogin() {
        window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.pathname || "/admin.html");
      }

      function initUserDropdown() {
        var toggle = userDropdown.querySelector(".user-dropdown-toggle");
        toggle.addEventListener("click", function (e) {
          e.stopPropagation();
          userDropdown.classList.toggle("open");
        });
        document.addEventListener("click", function (e) {
          if (userDropdown.classList.contains("open") && !userDropdown.contains(e.target)) {
            userDropdown.classList.remove("open");
          }
        });
      }

      function initMenu() {
        menuItems.forEach(function (item) {
          item.addEventListener("click", function () {
            var page = item.getAttribute("data-page");
            var title = item.getAttribute("data-title");
            contentFrame.src = page;
            contentTitle.textContent = title;
            menuItems.forEach(function (it) { it.classList.remove("active"); });
            item.classList.add("active");
          });
        });
      }

      function refreshSession() {
        var t = getToken();
        if (!t) {
          gotoLogin();
          return;
        }
        fetch("/api/auth/me", { headers: authHeaders() })
          .then(function (res) {
            if (!res.ok) throw new Error("unauthorized");
            return res.json();
          })
          .then(function (me) {
            if (!me || me.role !== "ADMIN") {
              window.location.href = "/";
              return;
            }
            authInfo.textContent = me.username;
          })
          .catch(function () {
            localStorage.removeItem(TOKEN_KEY);
            gotoLogin();
          });
      }

      btnLogout.addEventListener("click", function () {
        var token = getToken();
        function finish() {
          localStorage.removeItem(TOKEN_KEY);
          gotoLogin();
        }
        if (!token) {
          finish();
          return;
        }
        fetch("/api/auth/logout", { method: "POST", headers: authHeadersJson() }).then(finish, finish);
      });

      refreshSession();
      initUserDropdown();
      initMenu();
    })();
  </script>
</body>
</html>
