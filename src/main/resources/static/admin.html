<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台 · agent-gateway-demo</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 1.25rem;
      max-width: 56rem;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.75rem; }
    .hint { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
    a { color: var(--accent); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    button {
      cursor: pointer;
      background: #212c3d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
    }
    button.primary {
      background: #1f6feb;
      border-color: #388bfd;
      color: #fff;
    }
    .stat { font-size: 0.95rem; margin-bottom: 0.75rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 0.5rem 0.65rem;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    .err { color: #f85149; font-size: 0.9rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>管理后台</h1>
  <p class="hint">使用<strong>管理员</strong>账号登录后，沿用首页保存在浏览器中的登录令牌。数据来源：<code>GET /api/admin/stats</code></p>
  <div class="toolbar">
    <a href="/">← 返回聊天</a>
    <button type="button" class="primary" id="btnLoad">刷新数据</button>
  </div>
  <div class="stat" id="totalUsers"></div>
  <div id="err" class="err"></div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>角色</th>
        <th>注册时间</th>
        <th>会话数</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    (function () {
      var TOKEN_KEY = "agentGatewayJwt";

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      var totalEl = document.getElementById("totalUsers");
      var tbody = document.getElementById("tbody");
      var errEl = document.getElementById("err");

      function setErr(t) {
        errEl.textContent = t || "";
      }

      function loadStats() {
        setErr("");
        var t = getToken();
        if (!t) {
          setErr("未登录：请先在首页登录管理员账号。");
          totalEl.textContent = "";
          tbody.innerHTML = "";
          return;
        }
        fetch("/api/admin/stats", {
          headers: { Authorization: "Bearer " + t }
        })
          .then(function (res) {
            if (res.status === 401) {
              throw new Error("登录已失效，请回到首页重新登录");
            }
            if (res.status === 403) {
              throw new Error("需要管理员角色（ADMIN）");
            }
            if (!res.ok) {
              return res.text().then(function (x) {
                throw new Error("HTTP " + res.status + ": " + x);
              });
            }
            return res.json();
          })
          .then(function (data) {
            totalEl.textContent = "用户总数：" + data.totalUsers;
            tbody.innerHTML = "";
            (data.users || []).forEach(function (u) {
              var tr = document.createElement("tr");
              tr.innerHTML =
                "<td>" +
                u.id +
                "</td><td>" +
                escapeHtml(u.username) +
                "</td><td>" +
                escapeHtml(u.role) +
                "</td><td>" +
                escapeHtml(u.createdAt || "") +
                "</td><td>" +
                u.sessionCount +
                "</td>";
              tbody.appendChild(tr);
            });
          })
          .catch(function (e) {
            setErr(String(e.message || e));
            totalEl.textContent = "";
            tbody.innerHTML = "";
          });
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      document.getElementById("btnLoad").addEventListener("click", loadStats);
      loadStats();
    })();
  </script>
</body>
</html>
